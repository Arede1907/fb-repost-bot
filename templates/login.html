<!doctype html>
<html lang="tr" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş — YT → FB Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 380px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <i class="bi bi-camera-video-fill text-danger fs-1"></i>
    <h5 class="mt-2 fw-bold text-white">YT → FB Bot</h5>
    <p class="text-muted small mb-0">Devam etmek için giriş yap</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small">
    <i class="bi bi-x-circle me-1"></i>{{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label class="form-label small text-muted">Kullanıcı Adı</label>
      <input type="text" class="form-control" name="username" autofocus autocomplete="username">
    </div>
    <div class="mb-4">
      <label class="form-label small text-muted">Şifre</label>
      <div class="input-group">
        <input type="password" class="form-control" name="password" id="pw" autocomplete="current-password">
        <button type="button" class="btn btn-outline-secondary"
                onclick="const i=document.getElementById('pw'); i.type=i.type==='password'?'text':'password'">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i>Giriş Yap
    </button>
  </form>
</div>
</body>
</html>
