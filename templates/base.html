<!doctype html>
<html lang="tr" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YT → FB Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; min-height: 100vh; }
    .navbar { border-bottom: 1px solid #30363d; }
    .card { border-color: #30363d; background: #161b22; }
    .card-header { border-bottom-color: #30363d; background: #1c2128; }
    .table { --bs-table-bg: transparent; --bs-table-hover-bg: rgba(255,255,255,.04); }
    .shared-row td { opacity: .45; }
    #progress-log { max-height: 300px; overflow-y: auto; font-family: monospace; font-size: .85rem; }
    .progress-line { padding: 2px 0; border-bottom: 1px solid #21262d; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold text-white" href="/">
      <i class="bi bi-camera-video-fill text-danger me-2"></i>YT → FB Bot
    </a>
    <div class="navbar-nav ms-auto flex-row gap-3 align-items-center">
      <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Ana Sayfa</a>
      <a class="nav-link" href="/videos"><i class="bi bi-collection-play me-1"></i>Videolar</a>
      <a class="nav-link" href="/repost-bots"><i class="bi bi-robot me-1"></i>Repost Bot</a>
      <a class="nav-link" href="/tw-bot"><i class="bi bi-heart-fill me-1"></i>TW Like Bot</a>
      <a class="nav-link" href="/tw-videos" id="nav-tw-videos"><i class="bi bi-film me-1"></i>TW Video</a>
      <a class="nav-link" href="/settings"><i class="bi bi-gear me-1"></i>Ayarlar</a>
      <a class="nav-link text-muted" href="/logout" title="Çıkış Yap">
        <i class="bi bi-box-arrow-right"></i>
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
